<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>مداحی جدید</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: Tahoma, sans-serif;
    }

    .bg {
      background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQb82LbsrGC793BmDe3uxZ5uC8dfMb0lkyT_w&s');
      background-size: cover;
      background-position: center;
      filter: blur(8px);
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* برای قرار دادن بالا */
      padding-top: 40px; /* فاصله از بالا */
      text-align: center;
      padding-left: 30px;
      padding-right: 30px;
      color: white;
    }

    input[type="button"] {
      background-color: rgba(255, 0, 0, 0.8);
      color: white;
      border: none;
      padding: 20px 40px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 20px;
      transition: background-color 0.3s ease;
    }

    input[type="button"]:hover {
      background-color: rgba(255, 0, 0, 1);
    }

  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content"> 
    <a href="a32.html"><input type="button" value="مداحی‌های فارسی"></a>
  </div>
</body>
</html>
