<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>مداحی جدید</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      font-family: Tahoma, sans-serif;
    }
    .bg {
      background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQb82LbsrGC793BmDe3uxZ5uC8dfMb0lkyT_w&s');
      background-size: cover;
      background-position: center;
      filter: blur(8px);
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .content {
      position: relative;
      z-index: 1;
      padding: 30px;
      color: white;
      text-align: center;
    }
    h2 {
      color: red;
      margin-bottom: 20px;
    }

    h3 {
      margin-top: 30px;
      color: white;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    hr {
      border: 0;
      height: 1px;
      background: #ccc;
      margin: 30px 0;
    }
    h4 {
        color: white;
        text-align: center;
    }
  </style>
</head>
<body>
    <div class="bg"></div>
  <div class="content">
      <h2>* مداحی‌های جدید ترکی *</h2>
    <h3>.لطفاً تا آخر گوش کنید.</h3>
    
    <h3>آغلارام کربلا (مهدی لیثی)</h3>
	<audio preload="none" src="https://dl.chadorkhaki.ir/mchadorkhaki/madahi/Mahdi%20Leisi%20Aghlaram%20Karbala(128).mp3" controls="controls">مرورگر شما از Player ساپورت نمی کند.</audio>
    <h3>درد دوا رقیه ریمیکس (علیرضا اسفندیاری)</h3>
    <audio  cursor: pointer;" preload="none" controls="controls" data-mce-fragment="1"><source src="https://dl.musiceman.net/Music/2024/07/13/pid_25234/alireza-esfandiaridarde-dava-roghayeh-r-320-(musiceman.net).mp3"></audio>
	<script>
  const players = document.querySelectorAll("audio");

  players.forEach(player => {
    player.addEventListener("play", () => {
      players.forEach(otherPlayer => {
        if (otherPlayer !== player) {
          otherPlayer.pause();
          otherPlayer.currentTime = 0; // اختیاری: از اول بیاره
        }
      });
    });
  });
</script>
	
  </div>
</body>
</html>
