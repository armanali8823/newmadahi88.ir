<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>مداحی جدید</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      font-family: Tahoma, sans-serif;
    }
    .bg {
      background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQb82LbsrGC793BmDe3uxZ5uC8dfMb0lkyT_w&s');
      background-size: cover;
      background-position: center;
      filter: blur(8px);
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .content {
      position: relative;
      z-index: 1;
      padding: 30px;
      color: white;
      text-align: center;
    }
    h2 {
      color: red;
      margin-bottom: 20px;
    }

    h3 {
      margin-top: 30px;
      color: white;
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    hr {
      border: 0;
      height: 1px;
      background: #ccc;
      margin: 30px 0;
    }
    h4 {
        color: white;
        text-align: center;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <h2>* مداحی‌های جدید *</h2>

  <h3>میم مثل مادر (حسین ستوده)</h3>
  <audio id="ms" preload="auto" src="https://dl.musicdel.ir/Music/1403/08/Hossein%20Sotode-Madar%20-musicdel.ir%20128.mp3" controls="" loop=""></audio>
  
      <h3>قمر سلام (امیر طلاجوران)</h3>
      <audio id="ms" preload="auto"
      src="https://dl.papilmusic.ir/Music/Amir Talajoran - Ghamar Salam.mp3"
      controls="" loop=""></audio>
      
      <h3>ام البکاء (حسین ستوده)</h3>
      <audio controls="" loop="" preload="metadata">
		<source src="https://files.olgoirani.com/Files/Content/1403/10/19909/Om-alboka.mp3" type="audio/mpeg">
		مرورگر شما از تگ صوت پشتیبانی نمی کند، از مرورگرهای بروز شده کروم و فایرفاکس استفاده نمائید
	</audio>
	
	<h3>ننه زهرا (حسین ستوده)</h3>
	<audio preload="none" src="https://irsv.upmusics.com/dlw/Hossein%20Sotode%20-%20Nane%20Zahra%20(320).mp3" controls="controls" controlslist="noplaybackrate">مرورگر شما از Player ساپورت نمی کند.</audio>
	
  </div>

</html>
